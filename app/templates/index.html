<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time News & Events Monitoring Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Real-Time News &amp; Events Monitoring</h1>
            <p class="subtitle">Utility Disruption Events Across India</p>
        </header>

        <!-- Stats Section -->
        <section class="stats-section">
            <div class="stat-card">
                <h3>Total Events</h3>
                <p class="stat-number" id="total-events">0</p>
            </div>
            <div class="stat-card">
                <h3>Power Outages</h3>
                <p class="stat-number" id="power-outage-count">0</p>
            </div>
            <div class="stat-card">
                <h3>Water Issues</h3>
                <p class="stat-number" id="water-issue-count">0</p>
            </div>
            <div class="stat-card">
                <h3>Logistics Delays</h3>
                <p class="stat-number" id="logistics-delay-count">0</p>
            </div>
        </section>

        <!-- Controls Section -->
        <section class="controls">
            <div class="filter-group">
                <label for="city-filter">Filter by City:</label>
                <select id="city-filter">
                    <option value="">All Cities</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="category-filter">Filter by Category:</label>
                <select id="category-filter">
                    <option value="">All Categories</option>
                    <option value="power_outage">Power Outage</option>
                    <option value="water_issue">Water Issue</option>
                    <option value="logistics_delay">Logistics Delay</option>
                </select>
            </div>

            <button class="refresh-btn" id="refresh-btn">Refresh Data</button>
        </section>

        <!-- Events Table -->
        <section class="events-section">
            <h2>Latest Events</h2>
            <div class="table-container">
                <table class="events-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>City</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>Source</th>
                        </tr>
                    </thead>
                    <tbody id="events-tbody">
                        <!-- Events will be populated here dynamically -->
                        <tr>
                            <td data-label="Status" colspan="5" class="loading">Loading events...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>Data sourced from Google News RSS | Updated in real-time</p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script>
        // ====================================================================
        // GLOBAL STATE
        // ====================================================================

        let allEvents = [];
        const API_BASE_URL = '';

        // ====================================================================
        // UTILITY FUNCTIONS
        // ====================================================================

        /**
         * Format category name for display
         */
        function formatCategory(category) {
            const categoryMap = {
                'power_outage': 'Power Outage',
                'water_issue': 'Water Issue',
                'logistics_delay': 'Logistics Delay'
            };
            return categoryMap[category] || category;
        }

        /**
         * Format date for display
         */
        function formatDate(dateString) {
            try {
                const date = new Date(dateString);
                return date.toLocaleString('en-IN', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch (e) {
                return dateString;
            }
        }

        /**
         * Get CSS class for category badge
         */
        function getCategoryClass(category) {
            const classMap = {
                'power_outage': 'category-power',
                'water_issue': 'category-water',
                'logistics_delay': 'category-logistics'
            };
            return classMap[category] || '';
        }

        // ====================================================================
        // API CALLS
        // ====================================================================

        /**
         * Fetch events from backend with optional filters
         */
        async function fetchEvents(city = '', category = '') {
            try {
                let url = `${API_BASE_URL}/events`;
                const params = new URLSearchParams();

                if (city) params.append('city', city);
                if (category) params.append('category', category);

                if (params.toString()) {
                    url += '?' + params.toString();
                }

                const response = await fetch(url);
                const events = await response.json();
                return events;
            } catch (error) {
                console.error('Error fetching events:', error);
                return [];
            }
        }

        /**
         * Fetch statistics from backend
         */
        async function fetchStats() {
            try {
                const response = await fetch(`${API_BASE_URL}/stats`);
                const stats = await response.json();
                return stats;
            } catch (error) {
                console.error('Error fetching stats:', error);
                return {};
            }
        }

        /**
         * Fetch cities from backend
         */
        async function fetchCities() {
            try {
                const response = await fetch(`${API_BASE_URL}/cities`);
                const cities = await response.json();
                return cities;
            } catch (error) {
                console.error('Error fetching cities:', error);
                return [];
            }
        }

        // ====================================================================
        // UI UPDATE FUNCTIONS
        // ====================================================================

        /**
         * Update statistics display
         */
        function updateStats(stats) {
            document.getElementById('power-outage-count').textContent =
                stats.power_outage || 0;
            document.getElementById('water-issue-count').textContent =
                stats.water_issue || 0;
            document.getElementById('logistics-delay-count').textContent =
                stats.logistics_delay || 0;

            const total = (stats.power_outage || 0) +
                         (stats.water_issue || 0) +
                         (stats.logistics_delay || 0);
            document.getElementById('total-events').textContent = total;
        }

        /**
         * Populate city filter dropdown
         */
        function populateCityFilter(cities) {
            const select = document.getElementById('city-filter');

            // Clear existing options (except "All Cities")
            select.innerHTML = '<option value="">All Cities</option>';

            // Add city options
            cities.forEach(cityData => {
                const option = document.createElement('option');
                option.value = cityData.city;
                option.textContent = `${cityData.city} (${cityData.count})`;
                select.appendChild(option);
            });
        }

        /**
         * Render events table
         */
        function renderEvents(events) {
            const tbody = document.getElementById('events-tbody');

            if (events.length === 0) {
                tbody.innerHTML = '<tr><td data-label="Status" colspan="5" class="no-data">No events found</td></tr>';
                return;
            }

            tbody.innerHTML = events.map(event => `
                <tr>
                    <td data-label="Title" class="title-cell">${event.title}</td>
                    <td data-label="City">${event.city}</td>
                    <td data-label="Category">
                        <span class="category-badge ${getCategoryClass(event.category)}">
                            ${formatCategory(event.category)}
                        </span>
                    </td>
                    <td data-label="Date">${formatDate(event.date)}</td>
                    <td data-label="Source">
                        <a href="${event.source}" target="_blank" class="source-link">
                            View
                        </a>
                    </td>
                </tr>
            `).join('');
        }

        // ====================================================================
        // MAIN LOAD FUNCTION
        // ====================================================================

        /**
         * Load all data and update UI
         */
        async function loadData() {
            // Get current filter values
            const cityFilter = document.getElementById('city-filter').value;
            const categoryFilter = document.getElementById('category-filter').value;

            // Show loading state
            document.getElementById('events-tbody').innerHTML =
                '<tr><td data-label="Status" colspan="5" class="loading">Loading events...</td></tr>';

            // Fetch all data in parallel
            const [events, stats, cities] = await Promise.all([
                fetchEvents(cityFilter, categoryFilter),
                fetchStats(),
                fetchCities()
            ]);

            // Update UI
            allEvents = events;
            updateStats(stats);
            populateCityFilter(cities);
            renderEvents(events);
        }

        // ====================================================================
        // EVENT LISTENERS
        // ====================================================================

        document.getElementById('city-filter').addEventListener('change', loadData);
        document.getElementById('category-filter').addEventListener('change', loadData);
        document.getElementById('refresh-btn').addEventListener('click', loadData);

        // ====================================================================
        // INITIALIZATION
        // ====================================================================

        // Load data on page load
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
